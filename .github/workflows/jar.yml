name: Gradle clean jar

on:
  push:
    branches:
      - main
      - dev # Not yet implemented in the workflow
  pull_request:
    branches:
      - main
      - dev # Not yet implemented in the workflow

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v3
        - name: Set up JDK 17
          uses: actions/setup-java@v3
          with:
            java-version: '21'
            distribution: 'temurin'
        - name: Test with Gradle
          run: ./gradlew clean shadowJar